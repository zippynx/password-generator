<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureGen - Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <div class="logo-shield">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shield-icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><rect x="9" y="11" width="6" height="4" rx="1" ry="1"></rect><path d="M10 11V9a2 2 0 0 1 4 0v2"></path></svg>
            </div>
            <div class="title-group">
                <h1>SECURE<span>GEN</span></h1>
                <p>Generate secure passwords in one click</p>
            </div>
        </header>

        <section class="password-display-section">
            <div class="password-box">
                <input type="text" id="result" placeholder="Initialize generator..." readonly>
                <button id="toggle-visibility" class="icon-btn" title="Toggle Visibility">
                    <svg id="eye-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>
            
            <div class="security-status">
                <div class="status-left">
                    <svg id="status-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    <span id="strength-text">Excellent Security</span>
                </div>
                <div class="status-right">
                    <span id="entropy-display">80 bits entropy</span>
                </div>
            </div>

            <div class="strength-segments">
                <div class="segment" id="seg-1"></div>
                <div class="segment" id="seg-2"></div>
                <div class="segment" id="seg-3"></div>
                <div class="segment" id="seg-4"></div>
            </div>
        </section>

        <section class="controls-section">
            <div class="length-control">
                <div class="length-header">
                    <label for="password-length">LENGTH</label>
                    <span id="length-val" class="value-badge">16</span>
                </div>
                <input type="range" id="password-length" min="8" max="64" value="16">
            </div>

            <div class="options-grid">
                <label class="option-card">
                    <input type="checkbox" id="lowercase-option" checked>
                    <div class="card-content">
                        <span class="card-icon">a-z</span>
                        <span class="card-title">Lowercase</span>
                    </div>
                </label>

                <label class="option-card">
                    <input type="checkbox" id="uppercase-option" checked>
                    <div class="card-content">
                        <span class="card-icon">A-Z</span>
                        <span class="card-title">Uppercase</span>
                    </div>
                </label>

                <label class="option-card">
                    <input type="checkbox" id="number-option" checked>
                    <div class="card-content">
                        <span class="card-icon">0-9</span>
                        <span class="card-title">Numbers</span>
                    </div>
                </label>

                <label class="option-card">
                    <input type="checkbox" id="special-option" checked>
                    <div class="card-content">
                        <span class="card-icon">#?!</span>
                        <span class="card-title">Symbols</span>
                    </div>
                </label>
            </div>
        </section>

        <div class="action-section">
            <button id="generate-button" class="btn-primary">Generate Password</button>
            <button id="copy-button" class="btn-secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
        </div>
    </main>

    <div id="toast">Copied to clipboard!</div>
    <script src="password_generator.js"></script>
</body>
</html>
